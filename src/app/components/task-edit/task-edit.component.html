@if (task()) {
  <form (ngSubmit)="submit()" class="row g-3 tf-edit-form">
    <div class="col-12">
      <label for="title" class="form-label">Title</label>
      <input
        id="title"
        name="title"
        type="text"
        class="form-control"
        [(ngModel)]="title"
        required
        placeholder="Task title"
      />
    </div>
    <div class="col-12">
      <label for="description" class="form-label">Description</label>
      <textarea
        id="description"
        name="description"
        class="form-control"
        rows="4"
        [(ngModel)]="description"
        placeholder="Update details…"
      ></textarea>
    </div>
    <div class="col-md-6">
      <label for="dueDate" class="form-label">Due date</label>
      <input id="dueDate" name="dueDate" type="date" class="form-control" [(ngModel)]="dueDate" />
    </div>
    <div class="col-md-3">
      <label for="status" class="form-label">Status</label>
      <select id="status" name="status" class="form-select" [(ngModel)]="status">
        @for (s of statuses; track s) {
          <option [ngValue]="s">{{ s }}</option>
        }
      </select>
    </div>
    <div class="col-md-3">
      <label for="priority" class="form-label">Priority</label>
      <select id="priority" name="priority" class="form-select" [(ngModel)]="priority">
        @for (p of priorities; track p) {
          <option [ngValue]="p">{{ p }}</option>
        }
      </select>
    </div>
    <div class="col-12 pt-2 d-flex flex-wrap gap-2">
      <button type="submit" class="btn btn-primary px-4">Save changes</button>
    </div>
  </form>
} @else {
  <p class="text-secondary mb-0">Task not found.</p>
}
