<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">TaskFlow</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" routerLink="/login">Login</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow-lg border-0">
        <div class="card-body p-4">
          <h2 class="card-title text-center mb-4 fw-bold text-dark">Login</h2>
          
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="username" class="form-label fw-semibold text-dark">Username</label>
              <input
                type="text"
                class="form-control form-control-lg"
                id="username"
                [(ngModel)]="username"
                name="username"
                required
                placeholder="Enter your username"
              />
            </div>

            <div class="mb-4">
              <label for="password" class="form-label fw-semibold text-dark">Password</label>
              <input
                type="password"
                class="form-control form-control-lg"
                id="password"
                [(ngModel)]="password"
                name="password"
                required
                placeholder="Enter your password"
              />
            </div>

            <div class="alert alert-danger" *ngIf="errorMessage">
              {{ errorMessage }}
            </div>

            <button
              type="submit"
              class="btn btn-primary btn-lg w-100"
              [disabled]="isLoading"
            >
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
              {{ isLoading ? 'Logging in...' : 'Login' }}
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
