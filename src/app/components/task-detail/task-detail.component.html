<div class="container py-4 py-lg-5 px-3 px-lg-4">
  @if (task(); as t) {
    <div class="card tf-detail-card border-0">
      <div class="tf-detail-card__header card-header border-0 d-flex flex-wrap justify-content-between align-items-start gap-3">
        <div>
          <p class="page-kicker text-uppercase mb-1">Task</p>
          <h1 class="h4 mb-0">{{ t.title }}</h1>
        </div>
        <span class="badge rounded-pill align-self-center px-3 py-2" [ngClass]="statusClass()">{{ t.status }}</span>
      </div>
      <ul class="nav nav-tabs px-3 border-bottom-0 tf-detail-card__tabs">
        <li class="nav-item">
          <a class="nav-link" routerLink="info" routerLinkActive="active">Details</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="edit" routerLinkActive="active">Edit</a>
        </li>
      </ul>
      <div class="card-body pt-4 tf-detail-card__body">
        <router-outlet />
      </div>
    </div>
  } @else {
    <div class="alert alert-warning border-0 shadow-sm">Loading task…</div>
  }
</div>
