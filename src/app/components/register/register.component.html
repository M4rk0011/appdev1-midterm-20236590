<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">TaskFlow</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/login">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" routerLink="/register">Register</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-4">
          <h2 class="card-title text-center mb-4 fw-bold text-dark">Create Account</h2>
          
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="username" class="form-label fw-semibold text-dark">Username</label>
              <input
                type="text"
                class="form-control form-control-lg"
                id="username"
                [(ngModel)]="username"
                name="username"
                required
                placeholder="Choose a username"
              />
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fw-semibold text-dark">Email</label>
              <input
                type="email"
                class="form-control form-control-lg"
                id="email"
                [(ngModel)]="email"
                name="email"
                required
                placeholder="Enter your email"
              />
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-semibold text-dark">Password</label>
              <input
                type="password"
                class="form-control form-control-lg"
                id="password"
                [(ngModel)]="password"
                name="password"
                required
                placeholder="Create a password"
              />
            </div>

            <div class="mb-4">
              <label for="confirmPassword" class="form-label fw-semibold text-dark">Confirm Password</label>
              <input
                type="password"
                class="form-control form-control-lg"
                id="confirmPassword"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                required
                placeholder="Confirm your password"
              />
            </div>

            <div class="alert alert-danger" *ngIf="errorMessage">
              {{ errorMessage }}
            </div>

            <div class="alert alert-success" *ngIf="successMessage">
              {{ successMessage }}
            </div>

            <button
              type="submit"
              class="btn btn-success btn-lg w-100 mb-3"
              [disabled]="isLoading"
            >
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
              {{ isLoading ? 'Creating Account...' : 'Create Account' }}
            </button>
          </form>

          <div class="text-center mt-4">
            <p class="text-dark mb-2">Already have an account?</p>
            <a routerLink="/login" class="btn btn-outline-primary btn-sm fw-semibold">
              Login
            </a>
          </div>

          <div class="mt-3 text-center">
            <small class="text-muted">
              Password must be at least 6 characters long
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
